<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Prompt Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    body { font-family: 'Inter', sans-serif; background: #f0f2f8; }
    textarea, input { -webkit-appearance: none; font-family: 'Inter', sans-serif; }
    textarea::placeholder { color: #aab; font-size: 16px; }

    @keyframes slideUp  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes checkIn  { from { transform:scale(0) rotate(-20deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }

    .cat-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: white;
      border: 2px solid #e8eaf0; border-radius: 16px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; text-align: left;
      width: 100%; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .cat-card:active { transform: scale(0.97); }

    .btn-primary {
      width: 100%; padding: 22px;
      background: linear-gradient(135deg, #f5c842 0%, #d4a020 100%);
      border: none; border-radius: 18px; color: #1a0f00;
      font-family: 'Nunito', sans-serif; font-size: 21px; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(212,160,32,0.5), 0 1px 0 rgba(255,255,255,0.4) inset;
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-primary:active  { transform: scale(0.97); box-shadow: 0 2px 10px rgba(212,160,32,0.3); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-copy {
      width: 100%; padding: 20px; border: none; border-radius: 18px;
      font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900;
      cursor: pointer; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-soft {
      padding: 11px 18px; background: rgba(255,255,255,0.15);
      border: none; border-radius: 12px; color: rgba(255,255,255,0.9);
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-soft:active { background: rgba(255,255,255,0.25); }

    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── CATEGORIES & PROMPT BUILDERS ────────────────────────────────────────────

const CATS = [
  {
    emoji: "📲", label: "Social Media & Marketing",
    color: "#e040a0", bg: "#fdf0f8",
    hint: "e.g. Instagram post for my lakefront listing that feels personal and drives DMs",
    build: (t) => `You are a world-class social media strategist and direct-response copywriter with 15+ years of experience growing brands across Instagram, Facebook, LinkedIn, and TikTok. You have written viral content for top real estate agents, lifestyle brands, and local businesses.

REQUEST: ${t}

Deliver ALL of the following:

1. PLATFORM STRATEGY
   - Which platform(s) this content is best suited for and why
   - Optimal posting time and day for maximum reach
   - Content format recommendation (static, carousel, reel, story)

2. PRIMARY POST (ready to copy-paste)
   - Hook line (first 3 words must stop the scroll)
   - Body copy written in a warm, human voice — never corporate or robotic
   - Emotional storytelling element that creates connection
   - Clear call to action that feels natural, not pushy
   - 10 to 15 targeted hashtags (mix of niche, local, and broad)

3. ALTERNATE VERSION
   - A second angle with a completely different hook and tone

4. STORY / REEL SCRIPT (15 to 30 seconds)
   - Scene-by-scene breakdown with on-screen text and voiceover

5. ENGAGEMENT STRATEGY
   - 3 specific ways to boost comments and shares on this post
   - Suggested reply to the first comment to spark conversation

Write everything ready to deploy. No placeholders, no vague advice.`,
  },
  {
    emoji: "📈", label: "Investment Research",
    color: "#1a7f4b", bg: "#f0faf4",
    hint: "e.g. Is NXPL NextPlat Corp a good speculative buy right now given their HealthWarehouse deal",
    build: (t) => `You are a senior investment analyst and portfolio strategist with deep expertise in equities, alternative assets, real estate investment, and speculative positions. You think like someone with serious capital on the line.

REQUEST: ${t}

Deliver a complete investment research report covering ALL of the following:

1. EXECUTIVE SUMMARY
   - One-paragraph plain-English verdict: buy, hold, avoid, or monitor
   - Confidence level and primary reasoning

2. FUNDAMENTAL ANALYSIS
   - Business model and revenue drivers
   - Financial health: revenue trajectory, burn rate, debt, cash position
   - Recent catalysts or announcements and their real significance
   - Competitive moat or lack thereof

3. TECHNICAL PICTURE
   - Current price action and trend direction
   - Key support and resistance levels
   - Volume patterns and what they suggest
   - Short interest, float, and squeeze potential if applicable

4. RISK MATRIX
   - Top 3 bull case scenarios with specific triggers
   - Top 3 bear case scenarios with specific triggers
   - Regulatory, macro, or sector-specific risks
   - Liquidity risk and exit considerations

5. COMPARABLE ANALYSIS
   - 2 to 3 comparable investments and how this stacks up

6. VERDICT & STRATEGY
   - Specific entry zone recommendation
   - Position sizing guidance (what % of a speculative portfolio)
   - Stop loss level and take-profit targets
   - Time horizon for the thesis to play out

Be direct. Give a real point of view. Think like someone with real money at stake.`,
  },
  {
    emoji: "🏡", label: "Property Analysis",
    color: "#1a5fa8", bg: "#f0f6ff",
    hint: "e.g. Analyze 557 Oceana Drive Dillon Beach CA as a purchase for $1.2M — is it worth it",
    build: (t) => `You are a seasoned real estate analyst, investment advisor, and property valuation expert specializing in Northern California residential, coastal, lakefront, and commercial properties. You think like a buyer, investor, and agent simultaneously.

REQUEST: ${t}

Deliver a full property analysis covering ALL of the following:

1. PROPERTY OVERVIEW
   - Property type, location context, and neighborhood character
   - Lifestyle and use-case assessment (primary, vacation, rental, investment)

2. VALUATION ANALYSIS
   - Estimated fair market value range based on comparable sales
   - Price per square foot vs. local comps
   - Days on market context and what it signals about seller motivation
   - Overprice, fair price, or undervalued assessment with reasoning

3. INVESTMENT METRICS
   - Estimated gross rental income (long-term and short-term/Airbnb)
   - Estimated operating expenses and net cash flow
   - Cap rate and gross rent multiplier
   - Short-term rental viability and local STR regulations

4. DUE DILIGENCE RED FLAGS
   - Common issues for this property type and region
   - Questions to ask before making an offer
   - Inspection priorities
   - Title, zoning, and permit concerns

5. MARKET CONTEXT
   - Local market trend: appreciating, flat, or declining
   - Supply and demand dynamics in this micro-market
   - Macro factors affecting this area

6. NEGOTIATION INTELLIGENCE
   - Recommended offer price and strategy
   - Contingencies to include and why
   - Seller leverage vs. buyer leverage assessment
   - Creative terms that could strengthen the offer without raising price

7. VERDICT
   - Buy, negotiate harder, or walk away — and exactly why

Be specific. Use real numbers wherever possible. Think like someone writing a check.`,
  },
  {
    emoji: "🔢", label: "Spiritual & Numerology",
    color: "#6a35b8", bg: "#f7f0ff",
    hint: "e.g. What does 333 mean spiritually and why do I keep seeing it",
    build: (t) => `You are a deeply knowledgeable spiritual researcher and metaphysical scholar with expertise in numerology, angel numbers, sacred geometry, astrology, ancient wisdom traditions, Kabbalah, Eastern philosophy, and modern spiritual psychology. You bridge ancient esoteric knowledge with practical, grounded meaning.

REQUEST: ${t}

Deliver a comprehensive spiritual research response covering ALL of the following:

1. CORE MEANING
   - The primary spiritual significance and vibration of this number/symbol/concept
   - Why it appears in people's lives and what it is communicating

2. NUMEROLOGICAL BREAKDOWN
   - Root number reduction and its foundational energy
   - Master number significance if applicable
   - The specific power of repeated digits or patterns

3. CROSS-TRADITION SIGNIFICANCE
   - Biblical / Christian / Abrahamic interpretation
   - Hindu / Vedic / Sanskrit connection
   - Kabbalistic Tree of Life placement
   - Ancient Egyptian or Greek philosophical meaning
   - Buddhist or Taoist resonance

4. ANGEL NUMBER & DIVINE COMMUNICATION
   - What your guides or higher self may be signaling
   - Life areas this number most commonly activates
   - The message for someone seeing this repeatedly

5. ASTROLOGICAL & PLANETARY CONNECTION
   - Which planets, signs, or houses resonate with this energy
   - Current astrological context if relevant

6. PRACTICAL APPLICATION
   - How to work with this energy consciously
   - Meditation focus, affirmation, or intention to set
   - What action or shift in perspective is being invited

7. SYNCHRONICITY PATTERNS
   - Other signs and symbols that commonly appear alongside this
   - What it means when you see it at specific times of day

Write with depth, warmth, and wisdom. Bridge the mystical with the practical.`,
  },
  {
    emoji: "🌦️", label: "Deep Weather Research",
    color: "#0080cc", bg: "#f0f8ff",
    hint: "e.g. Detailed weather pattern for Northern California wine country this week",
    build: (t) => `You are a senior meteorologist, climate analyst, and regional weather expert with deep knowledge of atmospheric science, regional microclimates, historical weather patterns, and practical impact assessment for agriculture, recreation, travel, and daily life.

REQUEST: ${t}

Deliver a comprehensive weather research report covering ALL of the following:

1. REGIONAL OVERVIEW
   - Geographic and topographic factors shaping this region's weather
   - Dominant climate pattern and how it behaves this time of year
   - Key weather systems currently influencing the area

2. CURRENT WEEK FORECAST BREAKDOWN
   - Day-by-day conditions: temperature highs and lows, precipitation probability
   - Wind direction, speed, and gusts
   - Humidity, UV index, and visibility
   - Morning vs. afternoon vs. evening conditions each day

3. ATMOSPHERIC ANALYSIS
   - Pressure systems, fronts, and jet stream position
   - Moisture source and storm track if applicable
   - Inversion layers, fog potential, or fire weather conditions if relevant

4. MARINE / LAKE / MOUNTAIN CONDITIONS
   - Water temperature, wave height, and wind-driven chop for boating or fishing
   - Snow level and pass conditions for mountain areas
   - Tidal patterns for coastal areas

5. PRACTICAL IMPACT ASSESSMENT
   - Best and worst days this week for outdoor activities
   - Agricultural impact: frost risk, irrigation needs, harvest windows
   - Travel advisories or road condition considerations
   - Health considerations: air quality, allergy levels, wildfire smoke

6. EXTENDED OUTLOOK
   - 10 to 14 day trend and pattern shifts coming
   - El Nino / La Nina influence if in season
   - How this week compares to historical averages

7. LOCAL KNOWLEDGE
   - Microclimatic quirks specific to this region
   - What locals know that the forecast apps miss

Be specific, practical, and thorough.`,
  },
  {
    emoji: "🔭", label: "Conspiracy Research",
    color: "#c04020", bg: "#fff5f0",
    hint: "e.g. Deep dive on the Epstein network and who has not been held accountable",
    build: (t) => `You are a rigorous investigative journalist, geopolitical analyst, and deep research specialist trained in critical thinking, source verification, historical pattern recognition, and separating documented facts from speculation. You approach all topics with intellectual honesty.

REQUEST: ${t}

Deliver a comprehensive investigative research report covering ALL of the following:

1. ESTABLISHED DOCUMENTED FACTS
   - What is confirmed by court documents, government records, or multiple credible sources
   - Key dates, names, organizations, and verified events in chronological order
   - Primary source citations and where to find them

2. CREDIBLE ALLEGATIONS & SERIOUS CLAIMS
   - Well-sourced claims that have not been fully disproven
   - Whistleblower testimony and insider accounts
   - Investigative journalism published by major outlets
   - Legal proceedings, indictments, and their outcomes

3. INSTITUTIONAL FAILURES & POWER STRUCTURES
   - Which institutions or oversight bodies failed and why
   - Documented conflicts of interest among key figures
   - How money, influence, or leverage may have shaped outcomes
   - Historical precedents for similar patterns

4. WHAT REMAINS UNKNOWN OR SUPPRESSED
   - Specific unanswered questions that legitimate investigators have raised
   - Documents that are sealed, classified, or unavailable
   - Witnesses who have died, disappeared, or refused to testify

5. SPECULATIVE TERRITORY (clearly labeled)
   - Theories that exist in the public domain and their credibility assessment
   - Red flags that have not been fully explained
   - Patterns that suggest coordination vs. coincidence

6. CRITICAL ANALYSIS
   - Common logical fallacies in popular narratives about this topic
   - What a skeptic would say and how to evaluate those counterarguments

7. HOW TO DIG DEEPER
   - Specific books, documentaries, court filings, or databases to explore
   - Journalists or researchers doing credible work on this topic

Label facts, allegations, and speculation clearly throughout.`,
  },
  {
    emoji: "⚙️", label: "Engineering Research",
    color: "#444466", bg: "#f4f4f8",
    hint: "e.g. Best practices for designing a solar-powered irrigation system for a 5-acre property",
    build: (t) => `You are a licensed professional engineer and applied research specialist with cross-disciplinary expertise spanning civil, mechanical, electrical, structural, and systems engineering. You bridge theoretical knowledge with real-world implementation, cost realities, and code compliance.

REQUEST: ${t}

Deliver a comprehensive engineering research report covering ALL of the following:

1. TECHNICAL OVERVIEW
   - Engineering principles and physics governing this system or problem
   - Key variables, constraints, and design parameters
   - Industry-standard approaches and why they are preferred

2. DESIGN OPTIONS & TRADE-OFFS
   - 3 distinct design approaches ranked by cost, complexity, and performance
   - Pros and cons of each with quantified metrics where possible
   - Which approach is recommended and the detailed reasoning

3. MATERIALS & SPECIFICATIONS
   - Recommended materials, components, or systems with specific grades or ratings
   - Equipment sizing calculations or methodology
   - Supplier landscape and procurement considerations

4. LOAD CALCULATIONS & PERFORMANCE MODELING
   - Relevant engineering calculations with formulas shown
   - Safety factors, redundancy requirements, and failure mode analysis
   - Expected performance metrics and efficiency benchmarks

5. CODE & COMPLIANCE
   - Applicable codes, standards, and regulations (IBC, ASCE, NEC, OSHA, etc.)
   - Permitting requirements and typical approval process

6. COST ESTIMATE
   - Material cost range
   - Labor cost range
   - Total installed cost range and contingency recommendation

7. LIFECYCLE & MAINTENANCE
   - Expected service life and degradation factors
   - Maintenance schedule and cost estimates

Be specific, use engineering units, and write for someone who will act on this.`,
  },
  {
    emoji: "🏗️", label: "Construction Code Research",
    color: "#8a4a10", bg: "#fdf7f0",
    hint: "e.g. Building codes for adding a dock on Clear Lake CA — permits, setbacks, materials",
    build: (t) => `You are a licensed general contractor, code compliance specialist, and construction research expert with deep knowledge of California Building Code, local municipal codes, fire codes, ADA requirements, zoning regulations, and the permit process across Northern California jurisdictions.

REQUEST: ${t}

Deliver a comprehensive construction code research report covering ALL of the following:

1. JURISDICTION IDENTIFICATION
   - Which governing bodies have authority (city, county, state, federal)
   - Which specific codes apply: CBC, CRC, CMC, CPC, CEC, local amendments
   - Year of current adopted code edition for this jurisdiction

2. APPLICABLE CODE SECTIONS
   - Exact code sections and chapter references that govern this work
   - Plain-English translation of each relevant requirement
   - Where state code and local amendments differ

3. PERMIT REQUIREMENTS
   - Which permits are required and from which agencies
   - What triggers permit requirement vs. exempt work
   - Application requirements: plans, calculations, soils reports, etc.
   - Typical timeline from application to approval and fee estimate range

4. SETBACKS, ZONING & EASEMENTS
   - Required setbacks from property lines, waterways, roads, and structures
   - Zoning designation and allowed uses
   - FAR, lot coverage, and height restrictions if applicable

5. STRUCTURAL & MATERIAL REQUIREMENTS
   - Minimum material grades, specifications, and standards
   - Structural requirements and engineering stamp triggers
   - Seismic zone requirements for this region

6. INSPECTIONS REQUIRED
   - Which inspections are required in sequence
   - What the inspector will look for at each stage
   - Common reasons for failed inspections on this type of work

7. ENVIRONMENTAL & AGENCY APPROVALS
   - CEQA, FEMA floodplain, coastal commission, or waterway permits if applicable
   - Army Corps of Engineers or water board involvement

8. PRACTICAL TIPS
   - What to ask the building department before submitting
   - Common mistakes that cause plan check rejections
   - How to expedite approval

Be specific to the jurisdiction. Flag anything that requires a licensed professional to verify.`,
  },
  {
    emoji: "🗺️", label: "Public Land Explorer",
    color: "#2a7a40", bg: "#f0faf4",
    hint: "e.g. Find all open public land to hike and explore around Clear Lake and Lake County CA",
    build: (t) => `You are an expert public lands researcher, outdoor recreation specialist, and wilderness access advocate with comprehensive knowledge of BLM lands, National Forests, state parks, wildlife refuges, watershed lands, county open space, and access laws across California and the Western United States.

REQUEST: ${t}

Deliver a comprehensive public land research report covering ALL of the following:

1. LAND OVERVIEW BY TYPE
   - Name, managing agency, total acreage, and contact information for each area
   - Location description and how to reach trailheads or access points
   - Open hours, seasonal closures, and permit requirements
   - Dogs allowed or prohibited and leash rules
   - Vehicle access: paved, dirt, high-clearance, or 4WD required

2. BLM LAND
   - Specific BLM units or field office jurisdiction
   - Dispersed camping rules and where it is allowed
   - OHV and motorized use rules
   - Maps and digital resources (OnX, BLM GeoCommunicator, etc.)

3. NATIONAL FOREST & WILDERNESS
   - Ranger district contact and website
   - Wilderness areas with no-motor rules
   - Fire restrictions and current closure information
   - Water sources and seasonal stream conditions

4. STATE PARKS & STATE LANDS
   - California State Parks in the area with entrance fees
   - Day use vs. camping availability and reservation requirements

5. WILDLIFE & WATERSHED LANDS
   - Wildlife refuges and management areas with public access
   - Water district lands open to the public (often free and uncrowded)

6. HIDDEN GEMS & LOCAL KNOWLEDGE
   - Less-known access points that most visitors miss
   - Local land trusts with public trail access

7. MAPS & NAVIGATION
   - Specific USGS quad map names covering this area
   - OnX Hunt / OnX Offroad layers most useful here
   - GPS coordinates or addresses for key access gates or trailheads

8. SEASONAL GUIDE
   - Best months to visit and why
   - Months to avoid and specific hazards
   - Water availability by season

9. RULES, SAFETY & WILDLIFE
   - Leave No Trace priorities specific to this landscape
   - Fire regulations and current fire danger level
   - Wildlife awareness: specific species, season, and behavior notes
   - Cell service and emergency contact protocols

Make this report so complete someone could plan a full day outside using only this.`,
  },
  {
    emoji: "✨", label: "Other / Custom",
    color: "#555577", bg: "#f8f8fb",
    hint: "Describe anything you need in your own words",
    build: (t) => `You are a world-class expert and research specialist. Approach the following request as the most knowledgeable person alive on this subject. Bring depth, specificity, and genuine insight — not surface-level generalities.

REQUEST: ${t}

Deliver a comprehensive, structured response covering ALL of the following:

1. CORE ANSWER
   - Direct, specific response to the request
   - The key insight or finding most people miss

2. DEEP CONTEXT
   - Background and context that makes the answer more valuable
   - Historical, scientific, or industry context as relevant
   - The most important nuances and caveats

3. DETAILED BREAKDOWN
   - Full exploration of the topic with specific facts, figures, and examples
   - Multiple perspectives or approaches where relevant
   - Comparison to alternatives or related concepts

4. PRACTICAL APPLICATION
   - Exactly how to use this information
   - Step-by-step guidance where the request warrants it
   - Common mistakes to avoid

5. RESOURCES & NEXT STEPS
   - Specific books, tools, sources, or experts to explore
   - The single most important next action to take

Be thorough. Be specific. Deliver something worth reading twice.`,
  },
];

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [screen,   setScreen]   = useState("home");
  const [selected, setSelected] = useState(null);
  const [input,    setInput]    = useState("");
  const [result,   setResult]   = useState("");
  const [building, setBuilding] = useState(false);
  const [copied,   setCopied]   = useState(false);
  const [history,  setHistory]  = useState([]);
  const textareaRef = useRef(null);

  useEffect(() => {
    const el = textareaRef.current;
    if (!el) return;
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }, [input]);

  const handleSelect = (i) => {
    setSelected(i);
    const text = CATS[i].hint.replace("e.g. ", "");
    setInput(text);
    setBuilding(true);
    setCopied(false);
    setTimeout(() => {
      const built = CATS[i].build(text);
      setResult(built);
      setBuilding(false);
      setHistory(prev => [{ id: Date.now(), input: text, prompt: built, cat: i }, ...prev].slice(0, 10));
      setScreen("result");
    }, 500);
  };

  const handleBuild = () => {
    if (!input.trim() || building) return;
    setBuilding(true);
    setCopied(false);
    const cat = selected !== null ? CATS[selected] : CATS[CATS.length - 1];
    setTimeout(() => {
      const built = cat.build(input.trim());
      setResult(built);
      setBuilding(false);
      setHistory(prev => [{ id: Date.now(), input: input.trim(), prompt: built, cat: selected }, ...prev].slice(0, 10));
      setScreen("result");
    }, 500);
  };

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(result);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = result;
      ta.style.cssText = "position:fixed;opacity:0;top:0;left:0;";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  const activeCat = selected !== null ? CATS[selected] : null;
  const resCat    = selected !== null ? CATS[selected] : CATS[CATS.length - 1];

  // ── HOME ────────────────────────────────────────────────────────────────────

  if (screen === "home") return (
    <div style={{ minHeight: "100vh", background: "#f0f2f8" }}>

      {/* Header */}
      <div style={{ background: "linear-gradient(150deg, #160e2e 0%, #241550 55%, #1a1040 100%)", padding: "52px 22px 30px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -40, right: -40, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle, rgba(245,200,66,0.15) 0%, transparent 70%)", pointerEvents: "none" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <div style={{ width: 9, height: 9, borderRadius: "50%", background: "#f5c842", boxShadow: "0 0 12px rgba(245,200,66,1)" }} />
          <span style={{ fontFamily: "Nunito, sans-serif", fontSize: 13, fontWeight: 800, letterSpacing: "3px", color: "rgba(245,200,66,0.9)", textTransform: "uppercase" }}>AI Prompt Lab</span>
        </div>
        <h1 style={{ fontFamily: "Nunito, sans-serif", fontSize: 40, fontWeight: 900, lineHeight: 1.1, color: "white", marginBottom: 10 }}>
          Say It Plain.<br /><span style={{ color: "#f5c842" }}>Get the Prompt.</span>
        </h1>
        <p style={{ fontSize: 16, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
          Tap any category and get your prompt instantly.
        </p>
      </div>

      <div style={{ padding: "22px 16px 160px" }}>

        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "2px", color: "#888", textTransform: "uppercase", marginBottom: 14 }}>Tap Any Category — Instant Prompt</div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 28 }}>
          {CATS.map((cat, i) => {
            const isSel = selected === i;
            return (
              <button key={i} className="cat-card" onClick={() => handleSelect(i)}
                style={{ borderColor: isSel ? cat.color : "#e8eaf0", background: isSel ? cat.bg : "white", boxShadow: isSel ? `0 0 0 3px ${cat.color}28, 0 2px 8px rgba(0,0,0,0.06)` : "0 2px 6px rgba(0,0,0,0.05)" }}>
                <span style={{ fontSize: 30, minWidth: 38, textAlign: "center" }}>{cat.emoji}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: isSel ? cat.color : "#1a1a2e", lineHeight: 1.3 }}>{cat.label}</div>
                  {isSel && <div style={{ fontSize: 12, color: cat.color, fontWeight: 600, marginTop: 2 }}>Selected ✓</div>}
                </div>
                <span style={{ fontSize: 20, color: isSel ? cat.color : "#ccc" }}>{isSel ? "●" : "›"}</span>
              </button>
            );
          })}
        </div>

        {/* Divider */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
          <div style={{ flex: 1, height: 1, background: "#dde0ea" }} />
          <span style={{ fontSize: 13, fontWeight: 600, color: "#999" }}>edit or type your own</span>
          <div style={{ flex: 1, height: 1, background: "#dde0ea" }} />
        </div>

        {/* Textarea */}
        <div style={{ background: "white", border: `2px solid ${activeCat ? activeCat.color : (input.trim() ? "#c9a030" : "#dde0ea")}`, borderRadius: 18, padding: 18, marginBottom: 16, boxShadow: activeCat ? `0 0 0 4px ${activeCat.color}18` : input.trim() ? "0 0 0 4px rgba(201,160,48,0.1)" : "0 2px 8px rgba(0,0,0,0.04)", transition: "all 0.2s" }}>
          <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "1px", color: activeCat ? activeCat.color : "#c9a030", textTransform: "uppercase", marginBottom: 10 }}>
            {activeCat ? activeCat.label : "What do you need?"}
          </div>
          <textarea
            ref={textareaRef}
            value={input}
            onChange={e => { setInput(e.target.value); if (selected !== null && e.target.value !== CATS[selected].hint) setSelected(null); }}
            rows={4}
            style={{ width: "100%", background: "none", border: "none", outline: "none", color: "#1a1a2e", fontSize: 17, lineHeight: 1.65, resize: "none", minHeight: 80, overflowY: "hidden", fontWeight: 400 }}
          />
          {input.trim() && (
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, paddingTop: 8, borderTop: "1px solid #f0f0f0" }}>
              <button onClick={() => { setInput(""); setSelected(null); }} style={{ background: "none", border: "none", color: "#bbb", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Clear ✕</button>
            </div>
          )}
        </div>

        {/* History */}
        {history.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "2px", color: "#888", textTransform: "uppercase", marginBottom: 10 }}>Recent</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {history.slice(0, 3).map(h => (
                <button key={h.id} onClick={() => { setInput(h.input); setResult(h.prompt); setSelected(h.cat); }}
                  style={{ textAlign: "left", background: "white", border: "1.5px solid #e8eaf0", borderRadius: 12, padding: "12px 14px", cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
                  <div style={{ fontSize: 14, color: "#333", lineHeight: 1.4, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 1, WebkitBoxOrient: "vertical" }}>{h.input}</div>
                  <div style={{ fontSize: 12, color: "#c9a030", fontWeight: 600, marginTop: 4 }}>Tap to reload →</div>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Sticky button */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "16px 16px 34px", background: "linear-gradient(to top, #f0f2f8 60%, transparent)", zIndex: 10 }}>
        <button className="btn-primary" onClick={handleBuild} disabled={!input.trim() || building}>
          {building
            ? <><div style={{ width: 22, height: 22, border: "3px solid rgba(26,15,0,0.2)", borderTopColor: "#1a0f00", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />Building...</>
            : <>✦ Build My Prompt</>}
        </button>
      </div>
    </div>
  );

  // ── RESULT ──────────────────────────────────────────────────────────────────

  if (screen === "result") return (
    <div style={{ minHeight: "100vh", background: "#f0f2f8", display: "flex", flexDirection: "column" }}>

      <div style={{ background: "linear-gradient(150deg, #160e2e 0%, #241550 100%)", padding: "52px 22px 24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <button className="btn-soft" onClick={() => setScreen("home")}>‹ Back</button>
          <button className="btn-soft" onClick={() => { setScreen("home"); setCopied(false); }}>↺ New Prompt</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <span style={{ fontSize: 28 }}>{resCat.emoji}</span>
          <span style={{ fontFamily: "Nunito, sans-serif", fontSize: 26, fontWeight: 900, color: "white" }}>Your Prompt</span>
        </div>
        <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)" }}>Copy and paste into ChatGPT, Claude, or any AI</div>
      </div>

      <div style={{ padding: "20px 16px 160px", flex: 1, animation: "slideUp 0.35s cubic-bezier(0.16,1,0.3,1)" }}>
        <div style={{ background: "white", border: `2px solid ${resCat.color}55`, borderRadius: 20, overflow: "hidden", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", marginBottom: 16 }}>
          <div style={{ padding: "14px 18px", background: resCat.bg, borderBottom: `1.5px solid ${resCat.color}33`, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 20 }}>{resCat.emoji}</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: resCat.color, letterSpacing: "1px", textTransform: "uppercase" }}>{resCat.label} — Ready to Use</span>
          </div>
          <div style={{ padding: "20px 18px", maxHeight: "54vh", overflowY: "auto" }}>
            <p style={{ fontSize: 15, lineHeight: 1.9, color: "#1a1a2e", whiteSpace: "pre-wrap", margin: 0, fontWeight: 400 }}>
              {result}
            </p>
          </div>
        </div>

        <div style={{ background: "#eef6ff", border: "1.5px solid #c8ddf8", borderRadius: 14, padding: "14px 16px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#4a7fc0", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 5 }}>Pro Tip</div>
          <div style={{ fontSize: 14, color: "#334", lineHeight: 1.6 }}>
            Paste this into any AI. The more specific your request was, the better the output will be.
          </div>
        </div>
      </div>

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "16px 16px 34px", background: "linear-gradient(to top, #f0f2f8 60%, transparent)", zIndex: 10 }}>
        <button className="btn-copy" onClick={handleCopy}
          style={{ background: copied ? "linear-gradient(135deg, #3db870, #229950)" : "linear-gradient(135deg, #f5c842 0%, #d4a020 100%)", color: copied ? "white" : "#1a0f00", boxShadow: copied ? "0 6px 24px rgba(61,184,112,0.5)" : "0 6px 28px rgba(212,160,32,0.5), 0 1px 0 rgba(255,255,255,0.4) inset" }}>
          {copied
            ? <><span style={{ animation: "checkIn 0.3s cubic-bezier(0.16,1,0.3,1)", display: "inline-block" }}>✓</span> Copied!</>
            : <>⎘ Copy Prompt</>}
        </button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
